<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Results — LEAP2 Talk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0d11;
  --surface: #13151c;
  --border:  #252837;
  --accent:  #60a5fa;
  --purple:  #a78bfa;
  --green:   #34d399;
  --amber:   #fbbf24;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --sans:    'DM Sans', sans-serif;
  --serif:   'DM Serif Display', serif;
  --mono:    'DM Mono', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow-y: auto;
  overflow-x: hidden;
}

#app {
  width: 100%; min-height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* — Bottom accent bar — */
#app::after {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--purple) 60%, transparent 100%);
  z-index: 20;
}

/* — Header — */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 1.4rem;
  flex-shrink: 0;
}

header h1 {
  font-family: var(--serif);
  font-size: 1.15rem;
  font-weight: 400;
  letter-spacing: -0.02em;
}

.counter {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--muted);
}

.counter-num {
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--green);
  line-height: 1;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.5s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

/* — Questions container — */
#results {
  flex: 1;
  padding: 0 1.4rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.q-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
}

.q-title {
  font-size: 0.82rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
  color: var(--text);
  line-height: 1.3;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.35rem;
}

.bar-label {
  flex: 0 0 40%;
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  flex: 1;
  height: 18px;
  background: color-mix(in srgb, var(--accent) 10%, var(--bg));
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  min-width: 0;
}

.bar-count {
  flex: 0 0 28px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text);
  text-align: right;
}

/* — Empty state — */
#empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 0.95rem;
  font-weight: 300;
  opacity: 0.6;
}

/* — Light theme — */
[data-theme="light"] {
  --bg:      #f8f9fb;
  --surface: #ffffff;
  --border:  #d1d5db;
  --accent:  #2563eb;
  --purple:  #7c3aed;
  --green:   #059669;
  --amber:   #d97706;
  --text:    #1e293b;
  --muted:   #64748b;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Live Poll</h1>
    <div class="counter">
      <div class="live-dot"></div>
      <span><span class="counter-num" id="count">0</span> votes</span>
    </div>
  </header>
  <div id="results"></div>
  <div id="empty">Waiting for votes...</div>
</div>

<script type="module">
import { RPCClient } from "/static/rpcclient.js";

const POLL_MS = 1500;

const rpc = RPCClient.fromCurrentPage({ studentId: "_live" });
const resultsEl = document.getElementById("results");
const emptyEl = document.getElementById("empty");
const countEl = document.getElementById("count");

let questions = [];
let pollTimer = null;

async function loadQuestions() {
  try {
    questions = await rpc.get_questions();
  } catch (err) {
    console.error("Failed to load questions:", err);
  }
}

function render(responses) {
  let totalVotes = 0;
  for (const qid in responses) {
    const counts = responses[qid];
    for (const idx in counts) totalVotes += counts[idx];
  }

  countEl.textContent = totalVotes;

  if (totalVotes === 0 && questions.length > 0) {
    emptyEl.style.display = "flex";
    resultsEl.innerHTML = "";
    return;
  }
  emptyEl.style.display = "none";

  resultsEl.innerHTML = "";

  for (const q of questions) {
    const counts = responses[q.id] || {};
    let qTotal = 0;
    for (const idx in counts) qTotal += counts[idx];

    const block = document.createElement("div");
    block.className = "q-block";

    const title = document.createElement("div");
    title.className = "q-title";
    title.textContent = q.question;
    block.appendChild(title);

    q.options.forEach((opt, oi) => {
      const count = counts[oi] || counts[String(oi)] || 0;
      const pct = qTotal > 0 ? (count / qTotal) * 100 : 0;

      const row = document.createElement("div");
      row.className = "bar-row";

      const label = document.createElement("div");
      label.className = "bar-label";
      label.textContent = opt;
      label.title = opt;

      const track = document.createElement("div");
      track.className = "bar-track";

      const fill = document.createElement("div");
      fill.className = "bar-fill";
      fill.style.width = pct + "%";

      track.appendChild(fill);

      const countSpan = document.createElement("div");
      countSpan.className = "bar-count";
      countSpan.textContent = count;

      row.appendChild(label);
      row.appendChild(track);
      row.appendChild(countSpan);
      block.appendChild(row);
    });

    resultsEl.appendChild(block);
  }
}

async function poll() {
  try {
    const responses = await rpc.get_results();
    render(responses);
  } catch (err) {
    console.error("Poll error:", err);
  }
}

function startPolling() {
  if (pollTimer) return;
  poll();
  pollTimer = setInterval(poll, POLL_MS);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// — Theme: URL param + postMessage —
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get("theme") === "light") document.documentElement.setAttribute("data-theme", "light");
  window.addEventListener("message", function(e) {
    if (e.data && e.data.theme) {
      if (e.data.theme === "light") document.documentElement.setAttribute("data-theme", "light");
      else document.documentElement.removeAttribute("data-theme");
    }
    if (e.data && e.data.polling !== undefined) {
      e.data.polling ? startPolling() : stopPolling();
    }
  });
})();

// — Init —
await loadQuestions();
if (window.self === window.top) startPolling();
</script>
</body>
</html>
