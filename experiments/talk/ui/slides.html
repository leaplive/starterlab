## The LEAP

**LEAP** = *Live Experiments for Active Pedagogy*

A **unified framework** for creating and sharing interactive, Nifty-like in-class demonstrations.

- LEAP serves **instructor-defined functions** as remote APIs
- Students **interact with these functions** from their own programming environment — Python, JS, Julia
- Interactions are **logged** — student, args, result, timestamp
- **Live dashboard** shows everyone's work as it happens
- **Share individual experiments** — others can add them to their own lab with `leap add`
- **Share entire labs** — a full collection of experiments, cloned and run in one step

.box.green[
<span class="dot"></span> Two-way — students drive &nbsp;
<span class="dot green"></span> Parallel interaction &nbsp;
<span class="dot amber"></span> Mistakes visible &nbsp;
<span class="dot purple"></span> Shareable across universities
]

## LEAP in Practice: Monte Carlo Method

.cols[
.col[
Students estimate π by sampling random points in a unit square.

- Call `sample()` to generate a random point
- Points inside the unit circle → <strong style="color:var(--green);">green</strong>, outside → <strong style="color:var(--red);">red</strong>
- π ≈ 4 × (inside / total)

.box.green[
Students see their estimate converge in real time — intuitive introduction to **Monte Carlo methods**.
]
]

## LEAP in Practice: Graph Search

.cols[
.col[
Students explore graphs by discovering neighbors one node at a time — then implement BFS or DFS in Python.

- Call `start()` to get the root node
- Call `neighbor(node)` to reveal adjacent nodes
- Click nodes to traverse — build the algorithm by hand first

.box.green[
Multiple graph types — binary trees, grids, Petersen graph, cycles — and instructors can add custom graphs via YAML.
]

<style>
/* Map theme.css variables so admin-modal.js renders correctly */
:root {
  --color-surface: #1e1e2e;
  --color-border: #3a3a5c;
  --color-text: #e2e8f0;
  --color-text-muted: #94a3b8;
  --color-primary: #60a5fa;
  --color-primary-light: rgba(96,165,250,0.15);
  --color-error: #f87171;
  --color-error-bg: rgba(248,113,113,0.1);
  --color-success: #34d399;
  --color-warning: #fbbf24;
  --radius: 6px;
  --radius-lg: 12px;

  --font-display: 'DM Serif Display', serif;
}
[data-theme="light"] {
  --color-surface: #ffffff;
  --color-border: #d1d5db;
  --color-text: #1e293b;
  --color-text-muted: #64748b;
  --color-primary: #2563eb;
  --color-primary-light: rgba(37,99,235,0.1);
  --color-error: #dc2626;
  --color-error-bg: rgba(220,38,38,0.08);
  --color-success: #059669;
  --color-warning: #d97706;
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

<script>
// Suppress all keyboard shortcuts (including remark's) while admin modal is open
function _blockKeys(e) {
  if (document.body.classList.contains('leap-modal-open') && e.key !== 'Escape') {
    e.stopImmediatePropagation();
  }
}
document.addEventListener('keydown', _blockKeys, true);
document.addEventListener('keyup', _blockKeys, true);
document.addEventListener('keypress', _blockKeys, true);
</script>
<script>
var slideshow = remark.create({
  ratio: '16:9',
  highlightStyle: 'atom-one-dark',
  highlightLines: true,
  countIncrementalSlides: false,
  navigation: { scroll: false },
});
// — Shared helpers —
function colorQR(svg, color) {
  svg = svg.replace(/fill="[^"]*"/g, function(m) {
    return m.indexOf('fff') !== -1 || m.indexOf('FFF') !== -1 || m === 'fill="white"' ? m : 'fill="' + color + '"';
  });
  return svg.replace(/fill:\s*#000[^;]*/g, 'fill:' + color).replace(/fill:\s*black/g, 'fill:' + color);
}

function syncIframePolling() {
  var visibleSlide = document.querySelector('.remark-visible .remark-slide-content');
  var visible = visibleSlide && (visibleSlide.querySelector('iframe') !== null);
  var iframes = document.querySelectorAll('iframe');
  for (var i = 0; i < iframes.length; i++) {
    try { iframes[i].contentWindow.postMessage({ polling: !!visible }, '*'); } catch(e) {}
  }
}

var _themeBtn = document.getElementById('theme-toggle');
function updateThemeBtn() {
  var onFirst = slideshow.getCurrentSlideIndex() === 0;
  _themeBtn.classList.toggle('visible', onFirst);
  _themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☀' : '☾';
}

slideshow.on('afterShowSlide', function() {
  updateThemeBtn();
  renderMathInElement(document.body, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$',  right: '$',  display: false },
    ],
    throwOnError: false,
  });
  syncIframePolling();
});

// — Theme toggle: press 't' to switch light/dark —
(function() {
  var root = document.documentElement;
  var saved = localStorage.getItem('slide-theme');
  if (saved === 'light') root.setAttribute('data-theme', 'light');

  var flashEl = document.createElement('div');
  flashEl.className = 'theme-flash';
  document.body.appendChild(flashEl);
  var flashTimer;

  function flash(msg) {
    flashEl.textContent = msg;
    flashEl.style.opacity = '1';
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function() { flashEl.style.opacity = '0'; }, 1200);
  }

  function swapThemedImages(theme) {
    var imgs = document.querySelectorAll('img.themed-img');
    for (var i = 0; i < imgs.length; i++) {
      var src = imgs[i].getAttribute('data-' + theme);
      if (src) imgs[i].src = src;
    }
  }

  function broadcastTheme(theme) {
    swapThemedImages(theme);
    var iframes = document.querySelectorAll('iframe');
    for (var i = 0; i < iframes.length; i++) {
      try { iframes[i].contentWindow.postMessage({ theme: theme }, '*'); } catch(e) {}
    }
  }

  function toggleTheme() {
    var isLight = root.getAttribute('data-theme') === 'light';
    var next = isLight ? 'dark' : 'light';
    if (next === 'dark') root.removeAttribute('data-theme');
    else root.setAttribute('data-theme', next);
    localStorage.setItem('slide-theme', next);
    flash(next === 'light' ? '☀ light' : '☾ dark');
    broadcastTheme(next);
    updateThemeBtn();
  }

  _themeBtn.addEventListener('click', toggleTheme);

  // Show button on first slide initially
  updateThemeBtn();

  // Sync theme to iframes once they load
  var _themeIframes = document.querySelectorAll('iframe');
  for (var _ti = 0; _ti < _themeIframes.length; _ti++) {
    _themeIframes[_ti].addEventListener('load', function() {
      var current = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      broadcastTheme(current);
    });
  }

  document.addEventListener('keydown', function(e) {
    if (document.body.classList.contains('leap-modal-open')) return;
    var tag = (e.target.tagName || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea' || tag === 'select') && e.target.offsetParent !== null) return;
    if (e.key === 'l' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      if (window._leapAdmin) {
        fetch('/logout', { method: 'POST', credentials: 'same-origin' })
          .then(function() { window.location.reload(); });
      } else if (window.LEAP && window.LEAP.showLogin) {
        window.LEAP.showLogin(function() { window.location.reload(); });
      } else {
        flash('loading login...');
        var _check = setInterval(function() {
          if (window.LEAP && window.LEAP.showLogin) {
            clearInterval(_check);
            window.LEAP.showLogin(function() { window.location.reload(); });
          }
        }, 100);
        setTimeout(function() { clearInterval(_check); }, 3000);
      }
    }
    if (e.key === 't' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      toggleTheme();
    }
    if (e.key === 's' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      var sw = document.getElementById('stopwatch');
      if (window._stopwatchInterval) {
        clearInterval(window._stopwatchInterval);
        window._stopwatchInterval = null;
        sw.style.display = 'none';
        sw.textContent = '00:00';
      } else {
        window._stopwatchStart = Date.now();
        sw.style.display = 'block';
        window._stopwatchInterval = setInterval(function() {
          var elapsed = Math.floor((Date.now() - window._stopwatchStart) / 1000);
          var m = String(Math.floor(elapsed / 60)).padStart(2, '0');
          var sc = String(elapsed % 60).padStart(2, '0');
          sw.textContent = m + ':' + sc;
        }, 1000);
      }
    }
  });
})();

// Load admin-modal.js after remark has built the DOM
(function() {
  var s = document.createElement('script');
  s.src = '/static/admin-modal.js';
  s.onload = function() { window._adminModalReady = true; };
  document.body.appendChild(s);
})();

// Generate QR code pointing to interact.html
// Set INTERACT_URL before the talk (depends on server IP/domain)
var INTERACT_URL = window.location.origin + "/exp/talk/ui/interact.html";
try {
  var qr = qrcode(0, 'M');
  qr.addData(INTERACT_URL);
  qr.make();
  var qrSvgInteract = colorQR(qr.createSvgTag(5, 0), '#f59e0b');
  document.querySelectorAll('[id="qr"]').forEach(function(el) {
    el.innerHTML = qrSvgInteract;
    var svg = el.querySelector('svg');
    if (svg) { svg.style.width = '100%'; svg.style.height = 'auto'; }
  });
} catch (e) {
  console.warn('QR generation failed:', e);
}

// Generate QR code for slides (audience follow-along)
var SLIDES_URL = window.location.origin + "/exp/talk/ui/slides.html";
try {
  var qr2 = qrcode(0, 'M');
  qr2.addData(SLIDES_URL);
  qr2.make();
  var qrSvg = colorQR(qr2.createSvgTag(6, 0), '#60a5fa');
  document.querySelectorAll('[id="qr-slides"]').forEach(function(el) {
    el.innerHTML = qrSvg;
    var svg = el.querySelector('svg');
    if (svg) { svg.style.width = '100%'; svg.style.height = 'auto'; }
  });
} catch (e) {
  console.warn('Slides QR generation failed:', e);
}

// Generate QR code for LEAP repo (thanks slide)
try {
  var qr3 = qrcode(0, 'M');
  qr3.addData('https://github.com/leaplive/LEAP2');
  qr3.make();
  var qrRepo = document.getElementById('qr-repo');
  if (qrRepo) {
    qrRepo.innerHTML = '<div style="font-family:var(--mono);font-size:0.8rem;color:#34d399;margin-bottom:4px;font-weight:600;">GitHub</div>' + colorQR(qr3.createSvgTag(6, 0), '#34d399');
  }
} catch (e) {
  console.warn('Repo QR generation failed:', e);
}

// Generate QR code for arXiv paper (thanks slide)
try {
  var qr4 = qrcode(0, 'M');
  qr4.addData('https://arxiv.org/abs/2601.22534');
  qr4.make();
  var qrArxiv = document.getElementById('qr-arxiv');
  if (qrArxiv) {
    qrArxiv.innerHTML = '<div style="font-family:var(--mono);font-size:0.8rem;color:#7c3aed;margin-bottom:4px;font-weight:600;">Paper</div>' + colorQR(qr4.createSvgTag(6, 0), '#7c3aed');
  }
} catch (e) {
  console.warn('arXiv QR generation failed:', e);
}

// — Slide sync —
(async function() {
  var isAdmin = false;

  try {
    var res = await fetch('/api/auth-status');
    var data = await res.json();
    isAdmin = data.admin;
  } catch(e) {}

  window._leapAdmin = isAdmin;

  if (isAdmin) {
    var hintEl = document.querySelector('.slide-hints');
    if (hintEl) hintEl.innerHTML = '<code>f</code> fullscreen &nbsp; · &nbsp; <code>t</code> toggle theme &nbsp; · &nbsp; admin · syncing slides &nbsp; · &nbsp; <code>l</code> logout';

    slideshow.on('afterShowSlide', function(slide) {
      var n = slide.getSlideIndex();
      fetch('/exp/talk/call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: '_admin', func_name: 'set_slide', args: [n] })
      }).catch(function(){});
    });
  } else {
    setInterval(async function() {
      try {
        var res = await fetch('/exp/talk/call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: '_viewer', func_name: 'get_slide', args: [] })
        });
        var data = await res.json();
        if (data.result && data.result.slide !== undefined) {
          var target = data.result.slide;
          var current = slideshow.getCurrentSlideIndex();
          if (target !== current) slideshow.gotoSlide(target + 1);
        }
      } catch(e) {}
    }, 2500);
  }
})();
</script>
